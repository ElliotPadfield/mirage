<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#0F0F14"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="228" ry="228" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect x="4" y="4" width="1016" height="1016" rx="224" ry="224" fill="none" stroke="#FFFFFF" stroke-opacity="0.08" stroke-width="4"/>

  <!-- Glow behind arrow -->
  <circle cx="512" cy="480" r="220" fill="url(#glow)"/>

  <!-- Navigation arrow - paper plane style, rotated slightly -->
  <g transform="translate(512, 480)">
    <!-- Shadow -->
    <g opacity="0.3" transform="translate(4, 8)">
      <path d="M-160,-180 L180,0 L-160,180 L-80,0 Z" fill="#7C3AED" transform="rotate(-45)"/>
    </g>
    <!-- Main arrow -->
    <path d="M-160,-180 L180,0 L-160,180 L-80,0 Z" fill="url(#accent)" transform="rotate(-45)"/>
    <!-- Highlight -->
    <path d="M-160,-180 L180,0 L-80,0 Z" fill="#FFFFFF" opacity="0.15" transform="rotate(-45)"/>
  </g>

  <!-- Subtle dot pattern at bottom -->
  <circle cx="512" cy="780" r="6" fill="#8B5CF6" opacity="0.5"/>
  <circle cx="480" cy="800" r="3" fill="#8B5CF6" opacity="0.25"/>
  <circle cx="544" cy="800" r="3" fill="#8B5CF6" opacity="0.25"/>
</svg>
