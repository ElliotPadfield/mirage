name: Release

on:
  push:
    branches: [main]

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check if version changed
        id: check
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json 2>/dev/null | jq -r .version 2>/dev/null || echo "")
          echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
          if [ "$CURRENT" != "$PREVIOUS" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS -> $CURRENT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged: $CURRENT"
          fi

  build-and-release:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Sync versions
        run: |
          VERSION=${{ needs.check-version.outputs.version }}

          # Sync tauri.conf.json
          jq --arg v "$VERSION" '.version = $v' src-tauri/tauri.conf.json > tmp.json && mv tmp.json src-tauri/tauri.conf.json

          # Sync Cargo.toml
          sed -i '' "s/^version = \".*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build Python sidecar
        run: python3 build-python-fast.py

      - name: Copy sidecar to Tauri binaries
        run: |
          mkdir -p src-tauri/binaries
          cp build/python/mirage-backend src-tauri/binaries/mirage-backend-aarch64-apple-darwin

      - name: Build Tauri app
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Generate latest.json for updater
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          BUNDLE_DIR="src-tauri/target/aarch64-apple-darwin/release/bundle"

          # Find the .tar.gz update bundle (Tauri generates this for macOS updater)
          UPDATE_BUNDLE=$(find "$BUNDLE_DIR/macos" -name "*.tar.gz" | head -1)
          if [ -z "$UPDATE_BUNDLE" ]; then
            echo "No .tar.gz update bundle found, listing bundle contents:"
            find "$BUNDLE_DIR" -type f
            exit 1
          fi

          UPDATE_FILENAME=$(basename "$UPDATE_BUNDLE")
          SIGNATURE=$(cat "${UPDATE_BUNDLE}.sig")

          cat > latest.json << EOF
          {
            "version": "${VERSION}",
            "notes": "Mirage v${VERSION}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${SIGNATURE}",
                "url": "https://github.com/ElliotPadfield/mirage/releases/download/v${VERSION}/${UPDATE_FILENAME}"
              }
            }
          }
          EOF

          echo "Generated latest.json:"
          cat latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: Mirage v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.tar.gz
            latest.json
